<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bài tập 8 tháng 3</title>

<style>

body{
font-family: Arial;
text-align:center;
background:linear-gradient(135deg,#ffd6e7,#fff);
height:100vh;
margin:0;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

h1{
color:#ff3e7f;
}

button{
padding:12px 25px;
border:none;
background:#ff4f8b;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

input{
padding:10px;
margin:10px;
border-radius:8px;
border:1px solid #ccc;
}

.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:500px;
}

.hidden{
display:none;
}

.name{
font-size:28px;
color:#ff3e7f;
font-weight:bold;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

.flower{
position:fixed;
top:-20px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh);
}
}

</style>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài tập 8 tháng 3</title>

<body>

<div id="home">

<h1>Bài tập 8 tháng 3</h1>

<button onclick="openForm()">Làm bài</button>

</div>

<div id="form" class="hidden">

<h2>Nhập thông tin</h2>

<input id="name" placeholder="Nhập họ và tên">

<br>

<input id="stt" placeholder="Số thứ tự">

<br>

<button onclick="check()">Xác nhận</button>

<p id="error" style="color:red"></p>

</div>

<div id="card" class="hidden">

<div class="card">

<div class="name" id="hello"></div>

<p>

Chúc bé một ngày 8/3 thật rạng rỡ.<br><br>

Mong bé luôn tự tin là chính mình, kiên cường và tỏa sáng theo cách riêng biệt nhất.<br><br>

Chúc bé không chỉ riêng ngày 8/3 mà mọi ngày trong năm đều cảm thấy mình được trân trọng, thấu hiểu và yêu thương.

</p>

</div>

</div>

<script>

const students={
1:"Nguyễn Ngọc Bão",
2:"Nguyễn Tuấn Chọn",
3:"Nguyễn Kiều Duyên",
4:"Trần Khánh Ngọc",
5:"Lê Trí Đại",
6:"Nguyễn Hải Đăng",
7:"Tạ Hải Đăng",
8:"Trần Thị Ngọc Hà",
9:"Nguyễn Thị Ngọc Hân",
10:"Nguyễn Huỳnh Tuyết Hoa",
11:"Phan Duy Hoàng",
12:"Nguyễn Huỳnh Ngọc Hương",
13:"Trương Hiện Hữu",
14:"Võ Hoàng Khả",
15:"Trần Huỳnh Đăng Khoa",
16:"Phạm Huỳnh Việt Lãm",
17:"Trần Nhật Nam",
18:"Nguyễn Ngọc Ngân",
19:"Nguyễn Thị Huỳnh Nghi",
20:"Trần Hiếu Nghĩa",
21:"Bùi Chí Nguyện",
22:"Sơn Thiện Nhân",
23:"Nguyễn Hoài Phát",
24:"Trần Vĩnh Phát",
25:"Trương Triệu Phi",
26:"Trần Minh Phú",
27:"Phan Trọng Phúc",
28:"Kim Nhật Tân",
29:"Lê Thị Anh Thơ",
30:"Liêu Chí Thức",
31:"Nguyễn Chí Thức",
32:"Trần Kim Tỏa",
33:"Cái Nguyễn Huỳnh Trân",
34:"Trần Phạm Thảo Trang",
35:"Nguyễn Quốc Trạng",
36:"Đoàn Trương Ngọc Tú",
37:"Nguyễn Mỹ Tiên",
38:"Trần Tấn Tỷ",
39:"Trần Biện Thế Văn",
40:"Trần Ngọc Vi",
41:"Tiền Thị Tường Vy"
}

function openForm(){
document.getElementById("home").classList.add("hidden")
document.getElementById("form").classList.remove("hidden")
}

function check(){

let name=document.getElementById("name").value.trim()
let stt=document.getElementById("stt").value.trim()

if(students[stt] && students[stt].toLowerCase()==name.toLowerCase()){

document.getElementById("form").classList.add("hidden")
document.getElementById("card").classList.remove("hidden")

document.getElementById("hello").innerHTML="Chúc "+name+" 8/3 vui vẻ 💐"

saveUser(name)

startConfetti()

flowers()

}else{

document.getElementById("error").innerText="Sai thông tin!"

}

}

function startConfetti(){

confetti({
particleCount:150,
spread:90
})

}

function flowers(){

setInterval(()=>{

let flower=document.createElement("div")

flower.className="flower"

flower.innerHTML="🌸"

flower.style.left=Math.random()*100+"%"

flower.style.animationDuration=3+Math.random()*5+"s"

document.body.appendChild(flower)

setTimeout(()=>flower.remove(),8000)

},300)

}

function saveUser(name){

let list=JSON.parse(localStorage.getItem("done")||"[]")

list.push(name)

localStorage.setItem("done",JSON.stringify(list))

}

</script>

</body>
</html>
